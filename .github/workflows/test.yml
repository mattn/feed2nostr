name: Test

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.x
    - name: Build
      run: go build ./...
    - name: Test
      run: go test -race ./...
    - name: Vet
      run: go vet ./...
